name: Deploy FitSpace to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "fitspace/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare FitSpace static site
        run: |
          mkdir -p public
          cp -r fitspace/* public/
          cp fitspace/.nojekyll public/.nojekyll 2>/dev/null || touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Verify deployment succeeded
        if: steps.deployment.outcome != 'success' && steps.deployment_retry.outcome != 'success'
        run: |
          echo "GitHub Pages deployment failed after retry."
          exit 1
